spring.application.name=todo-app-backend
api.version=v1
api.base-path=/api/${api.version}

# Database - replace with your actual values
spring.datasource.url=jdbc:postgresql://YOUR_SUPABASE_URL:6543/postgres
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT - replace with your secret
jwt.secret=YOUR_SECRET_KEY_AT_LEAST_32_CHARS
jwt.expiration=86400000

# PostgreSQL settings
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimumIdle=2